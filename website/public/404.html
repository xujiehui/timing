<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>定时关机管理</title>
    <script>
      // GitHub Pages SPA 路由支持
      var path = window.location.pathname;
      if (path.endsWith('/') && path !== '/timing/') {
        path = path.slice(0, -1);
      }
      window.location.replace('/timing/' + path.replace('/timing', '') + window.location.search + window.location.hash);
    </script>
  </head>
  <body>
    <p>正在重定向...</p>
  </body>
</html>
